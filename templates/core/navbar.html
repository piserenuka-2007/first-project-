<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
      <nav class="navbar navbar-expand-lg bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand text-light" href="#" >E-commerce Website <i class="fa fa-envira" style="font-size:40px;color:white"></i></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
    
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

    <li class="nav-item">
        <a class="nav-link active" href="/">Home</a>
    </li>

    <li class="nav-item">
        <a class="nav-link" href="{% url 'cart' %}">Cart</a>
    </li>


       {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link text-warning" href="#">{{user.username}}</a>
       </li>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'logout' %}">LogOut</a>
        </li>
 
        {% else %}

          <li class="nav-item">
            <a class="nav-link" href="{% url 'login' %}">Login</a>
        </li>

        <li class="nav-item">
            <a class="nav-link" href="{% url 'register' %}">Register</a>
        </li>

        
       {% endif %}

        <li class="nav-item">
            <a class="nav-link" href="{% url 'my_orders' %}">My Orders</a>
        </li>

       
</ul>
    </div>
  </div>
</nav>

<div class="container">
    {% block content %}

    {% endblock content %}
</div>

<div class="container-fluid">
<footer class=" bg-primary text-light text-center mt-5 p-3">
  <p>@ 2026 MyWebsite | All rights Reserved</p>
</footer>
</div>

</body>
</html>
