{% extends 'core/navbar.html' %}

   {% block content %}

   <div class="container ">
        <h1 class="text-center text-primary">Checkout</h1>
      <h2 class="text-center">Total: {{total}}</h2>
    <div class="row justify-content-center">
    
        <div class="col-md-6">
        <div class="card bg-warning" >
             <form method="POST">
                 {% csrf_token %}
                <label for="">Address: </label>
                <input type="text" placeholder="enter your address" class="form-control mb-3" required><br><br>
                <label for="">City: </label>
                <input type="text" placeholder="enter your city" class="form-control mb-3"  required><br><br>
                <label for="" >Pincode: </label>
                <input type="text" placeholder="enter your pincode" class="form-control mb-3"  required><br><br>
                
                <a href="{% url 'payment' %}" class="btn btn-primary">Pay Now</a>
                  </form>
        </div>
    </div>
    </div>
   </div>
 {% endblock content %}
